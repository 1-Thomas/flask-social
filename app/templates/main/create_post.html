{% extends "base.html" %}
{% block title %}New Post{% endblock %}
{% block content %}
  <h1>New Post</h1>
  <form method="post" enctype="multipart/form-data">
  {{ form.hidden_tag() }}

  {{ form.body.label }}<br>
  {{ form.body(rows=4, cols=60) }}

  <p>
    {{ form.image.label }}<br>
    {{ form.image() }}
  </p>

  {{ form.submit() }}
  </form>
{% endblock %}
